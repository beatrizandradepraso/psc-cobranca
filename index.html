<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC — Planejamento Semanal · Praso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --praso:#2D4BDE;--praso-dark:#1e35b0;--praso-light:#EEF1FD;--praso-mid:#C5CEFA;
  --m0:#2D4BDE;--m0-bg:#EEF1FD;
  --m1:#0ea5a0;--m1-bg:#E6F6F5;--m1-brd:#99D9D7;--m1-txt:#0a6e6b;
  --bg:#fff;--bg2:#F6F7F9;--bg3:#EDEEF2;
  --text:#16171A;--text2:#5A5C66;--text3:#9B9DA8;
  --brd:rgba(0,0,0,0.09);--brd2:rgba(0,0,0,0.16);
  --r:8px;--rl:12px;
  --green-bg:#EAFAF2;--green-txt:#1a6640;
  --red-bg:#FDEEEE;--red-txt:#8b1a1a;
  --amber-bg:#FEF5E7;--amber-txt:#7a4a00;
  --purple-bg:#F2EFFE;--purple-txt:#4a2ea0;
  --gray-bg:#F2F3F5;--gray-txt:#44464f;
  --teal-bg:#E6F6F5;--teal-txt:#0a6e6b;
  --coral-bg:#FEF0EC;--coral-txt:#8f3010;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%}
body{font-family:var(--font);font-size:14px;background:var(--bg2);color:var(--text);line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.sb-logo-txt h1{font-size:13px;font-weight:700;color:var(--text)}
.sb-logo-txt p{font-size:10px;color:var(--text3);margin-top:1px}
.sb-sec{padding:.875rem 1rem .5rem;flex:1}
.sb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.btn-nova{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--praso);background:none;color:var(--praso);cursor:pointer;font-family:var(--font);font-weight:600}
.btn-nova:hover{background:var(--praso-light)}
.sb-month{margin-bottom:10px}
.sb-month-name{font-size:12px;font-weight:700;color:var(--text2);padding:4px 2px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sb-month-name .arr{font-size:10px;color:var(--text3);transition:transform .18s}
.sb-month-name.open .arr{transform:rotate(90deg)}
.wk-item{font-size:12px;color:var(--text2);padding:6px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;transition:background .12s}
.wk-item:hover{background:var(--bg2);color:var(--text)}
.wk-item.active{background:var(--praso-light);color:var(--praso);font-weight:600}
.wk-item .wk-del{opacity:0;font-size:11px;background:none;border:none;color:inherit;cursor:pointer;padding:2px 4px}
.wk-item:hover .wk-del,.wk-item.active .wk-del{opacity:.5}
.wk-item .wk-del:hover{opacity:1;color:#ef4444}
.btn-new-wk{font-size:11px;padding:5px 8px;border-radius:6px;border:1px dashed var(--brd2);background:none;color:var(--text3);cursor:pointer;width:100%;text-align:left;margin-top:4px;font-family:var(--font)}
.btn-new-wk:hover{color:var(--text);background:var(--bg2)}
.sb-visao{padding:.75rem 1rem;border-top:1px solid var(--brd)}
.sb-footer{padding:.75rem 1rem;border-top:1px solid var(--brd);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background .3s}
.dot.saving{background:#f59e0b}.dot.err{background:#ef4444}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg2)}
.main-inner{max-width:1000px;margin:0 auto;padding:1.75rem 2rem 5rem}

/* BUTTONS */
.btn{font-size:12px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-weight:500;transition:background .12s}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--praso);color:#fff;border-color:var(--praso)}
.btn.primary:hover{background:var(--praso-dark)}
.btn.sm{font-size:11px;padding:4px 10px}
.btn.danger{color:#ef4444;border-color:#fca5a5}
.btn.danger:hover{background:var(--red-bg)}

/* TOPBAR */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.topbar-left h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.025em}
.topbar-left p{font-size:13px;color:var(--text2);margin-top:3px}
.topbar-acts{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.5rem}
.stat{background:var(--bg);border-radius:var(--r);border:1px solid var(--brd);padding:.75rem 1rem}
.stat .lbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.stat .val{font-size:15px;font-weight:700;color:var(--text)}
.stat.am0{border-left:3px solid var(--m0)}
.stat.am1{border-left:3px solid var(--m1)}

/* PESSOA TABS */
.pessoa-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.pessoa-tab{font-size:12px;padding:7px 18px;border-radius:20px;border:1.5px solid;background:var(--bg);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.pessoa-tab .dot-p{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.pessoa-tab.loading{opacity:.6}

/* FOCUS */
.focus-box{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rl);padding:.875rem 1.125rem;margin-bottom:1.5rem}
.focus-box label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:5px}
.focus-box textarea{width:100%;font-size:15px;font-weight:600;background:none;border:none;border-bottom:2px solid var(--brd2);color:var(--text);padding:4px 0;font-family:var(--font);resize:none;min-height:36px;line-height:1.5;overflow:hidden}
.focus-box textarea:focus{outline:none;border-color:var(--praso)}

/* GROUP */
.grp-hdr{display:flex;align-items:center;margin:1.75rem 0 1rem}
.grp-pill{padding:.5rem 1.125rem;font-size:13px;font-weight:700;white-space:nowrap;border-radius:var(--rl);flex-shrink:0}
.grp-pill.m0{background:var(--m0);color:#fff}
.grp-pill.m1{background:var(--m1);color:#fff}
.grp-pill.crit{background:#ef4444;color:#fff}
.grp-pill.info{background:var(--bg3);color:var(--text2);font-size:12px}
.grp-line{flex:1;height:1px;background:var(--brd);margin-left:12px}

/* SECTION CARD */
.sec-card{background:var(--bg);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:12px;overflow:hidden}
.sec-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.125rem;border-bottom:1px solid var(--brd)}
.sec-card-hdr.m0{border-left:4px solid var(--m0);background:var(--m0-bg)}
.sec-card-hdr.m1{border-left:4px solid var(--m1);background:var(--m1-bg)}
.sec-card-hdr.kad{border-left:4px solid #ef4444;background:#FEF2F2}
.sec-card-hdr.neu{border-left:4px solid var(--bg3);background:var(--bg2)}
.sec-card-title{display:flex;align-items:center;gap:8px}
.sec-card-title .ttl{font-size:13px;font-weight:700;color:var(--text)}
.sec-card-title .sub{font-size:11px;color:var(--text2)}
.sec-card-body{padding:.75rem 1.125rem 1rem}

/* BADGE */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.badge-ka{background:var(--praso-light);color:var(--praso);border:1px solid var(--praso-mid)}
.badge-nka{background:var(--amber-bg);color:var(--amber-txt)}
.badge-ac{background:var(--green-bg);color:var(--green-txt)}
.badge-dif{background:#FEF2F2;color:#b91c1c;border:1px solid #fca5a5}
.badge-m3{background:var(--purple-bg);color:var(--purple-txt)}
.badge-m1{background:var(--m1-bg);color:var(--m1-txt);border:1px solid var(--m1-brd)}

/* SORT */
.sort-bar{display:flex;align-items:center;gap:6px;padding:4px 0 8px;flex-wrap:wrap}
.sort-bar label{font-size:11px;color:var(--text3);font-weight:500}
.sort-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.sort-btn:hover{background:var(--bg3)}
.sort-btn.active{background:var(--praso-light);color:var(--praso);border-color:var(--praso-mid);font-weight:600}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table.ct{width:100%;border-collapse:collapse;min-width:560px}
table.ct th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--brd)}
table.ct td{padding:0;border-bottom:1px solid var(--brd);vertical-align:middle}
table.ct tr:last-child td{border-bottom:none}
.cw{padding:6px 8px}
.row-view{cursor:pointer;transition:background .1s}
.row-view:hover td{background:var(--praso-light)!important}
.row-editing td{background:var(--bg2)!important}
table.ct input,table.ct select,table.ct textarea{font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;font-family:var(--font)}
table.ct input:focus,table.ct select:focus,table.ct textarea:focus{outline:none;border-color:var(--praso)}
table.ct textarea{resize:vertical;min-height:38px;line-height:1.5}
.cli-nome{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.vbadge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.btn-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:3px 5px;border-radius:4px}
.btn-del:hover{color:#ef4444;background:var(--red-bg)}

/* PILLS */
.pill{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;font-weight:600;margin-top:2px}
.p-base{background:var(--praso-light);color:var(--praso)}
.p-promessa{background:var(--green-bg);color:var(--green-txt)}
.p-boleto{background:var(--purple-bg);color:var(--purple-txt)}
.p-sem-retorno{background:var(--amber-bg);color:var(--amber-txt)}
.p-serasa{background:var(--red-bg);color:var(--red-txt)}
.p-negociacao{background:var(--teal-bg);color:var(--teal-txt)}
.p-sem-exp{background:var(--gray-bg);color:var(--gray-txt)}
.p-outros{background:var(--gray-bg);color:var(--gray-txt)}
.p-pagando{background:var(--green-bg);color:var(--green-txt)}
.p-atrasado{background:var(--coral-bg);color:var(--coral-txt)}
.p-encerrado{background:var(--gray-bg);color:var(--gray-txt)}
.multi-st{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.st-add-btn{font-size:10px;padding:2px 8px;border-radius:20px;border:1px dashed var(--brd2);background:none;color:var(--text3);cursor:pointer;font-family:var(--font);margin-top:3px}
.st-add-btn:hover{background:var(--bg2);color:var(--text)}
.st-picker{position:absolute;z-index:100;background:var(--bg);border:1px solid var(--brd2);border-radius:var(--r);padding:8px;display:flex;flex-wrap:wrap;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:260px}
.st-picker-opt{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;cursor:pointer}
.st-picker-opt:hover{filter:brightness(.9)}

/* TOTAL */
.sec-total{display:flex;align-items:center;justify-content:flex-end;padding:8px 14px;border-top:1px solid var(--brd);background:var(--bg2)}
.sec-total .lbl{font-size:11px;color:var(--text3);margin-right:8px;font-weight:500}
.sec-total .val{font-size:14px;font-weight:700;color:var(--text)}

/* DIF */
.dif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.dif-card{background:var(--bg);border:1px solid #fca5a5;border-left:4px solid #ef4444;border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:background .12s}
.dif-card:hover{background:#FEF2F2}
.dif-card input,.dif-card textarea,.dif-card select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;margin-bottom:6px;font-family:var(--font)}
.dif-card textarea{resize:vertical;min-height:60px;line-height:1.5}
.dif-card input:focus,.dif-card textarea:focus,.dif-card select:focus{outline:none;border-color:var(--praso)}

/* ACORDOS */
.acord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ac-card{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:background .12s}
.ac-card:hover{background:var(--praso-light)}
.ac-card input,.ac-card select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;margin-bottom:6px;font-family:var(--font)}
.ac-card input:focus,.ac-card select:focus{outline:none;border-color:var(--praso)}

/* TEXTAREA BOX */
.ta-box label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:7px}
.ta-box textarea{width:100%;font-size:13px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--text);resize:vertical;min-height:90px;font-family:var(--font);line-height:1.6}
.ta-box textarea:focus{outline:none;border-color:var(--praso);background:var(--bg)}

/* VISÃO */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text2)}
.fchip{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s}
.fchip:hover{background:var(--bg3)}
.fchip.active{background:var(--praso);color:#fff;border-color:var(--praso);font-weight:600}
.vsec{background:var(--bg);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:16px;overflow:hidden}
.vsec-hdr{padding:.75rem 1.125rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.vsec-hdr.m0{border-left:4px solid var(--m0);background:var(--m0-bg)}
.vsec-hdr.m1{border-left:4px solid var(--m1);background:var(--m1-bg)}
.vsec-hdr.crit{border-left:4px solid #ef4444;background:#FEF2F2}
.vsec-hdr.acord{border-left:4px solid #22c55e;background:var(--green-bg)}
.vttl{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.vtable{width:100%;border-collapse:collapse;min-width:580px}
.vtable th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--brd)}
.vtable td{padding:8px 10px;border-bottom:1px solid var(--brd);font-size:12px;vertical-align:middle}
.vtable tr:last-child td{border-bottom:none}
.vtable tr:hover td{background:var(--bg2)}
.cbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.empty-v{text-align:center;padding:2rem;color:var(--text3);font-size:13px}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;width:400px;max-width:95vw;border:1px solid var(--brd2);box-shadow:0 12px 40px rgba(0,0,0,.13)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--text)}
.modal label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.modal input,.modal select{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg2);color:var(--text);font-family:var(--font);margin-bottom:1rem}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--praso);background:var(--bg)}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.wchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.wchip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.wchip:hover,.wchip.sel{background:var(--praso);color:#fff;border-color:var(--praso)}

/* EMPTY / TOAST */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty .ico{font-size:44px;margin-bottom:1rem;opacity:.3;display:block}
.empty p{font-size:14px;margin-bottom:1.25rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#16171A;color:#fff;font-size:12px;font-weight:500;padding:9px 20px;border-radius:20px;opacity:0;transition:opacity .22s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1}

@media(max-width:680px){.sidebar{display:none}.main-inner{padding:1rem 1rem 4rem}}
@media print{.sidebar,.topbar-acts,.btn,.btn-del,.btn-new-wk,.sort-bar,.st-add-btn,.pessoa-tabs{display:none!important}.shell{display:block}.main{overflow:visible;background:#fff}.main-inner{max-width:100%;padding:1rem}.sec-card{break-inside:avoid}}

/* ── LIMITE MANUAL ── */
.limite-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.toggle-limite{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-size:11px;font-weight:600}
.toggle-limite input{display:none}
.toggle-track{width:32px;height:18px;border-radius:20px;background:var(--brd2);transition:background .2s;flex-shrink:0;position:relative}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-limite input:checked+.toggle-track{background:#22c55e}
.toggle-limite input:checked+.toggle-track::after{transform:translateX(14px)}
.toggle-label-sim{color:#22c55e;display:none}
.toggle-label-nao{color:var(--text3)}
.toggle-limite input:checked~.toggle-label-sim{display:inline}
.toggle-limite input:checked~.toggle-label-nao{display:none}
.solicitante-field{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--green-bg);background:var(--green-bg);color:var(--green-txt);font-family:var(--font);width:120px;font-weight:500}
.solicitante-field::placeholder{color:#86d4a8;font-weight:400}
.solicitante-field:focus{outline:none;border-color:#22c55e;background:#fff}
.limite-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:var(--green-bg);color:var(--green-txt);border:1px solid #86d4a8;white-space:nowrap}
.limite-nao{font-size:10px;color:var(--text3)}

</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect x="0" y="0" width="16" height="16" rx="2" fill="#2D4BDE"/><rect x="20" y="0" width="16" height="16" rx="2" fill="#2D4BDE" opacity=".35"/><rect x="0" y="20" width="16" height="16" rx="2" fill="#2D4BDE" opacity=".35"/><rect x="20" y="20" width="16" height="16" rx="2" fill="#2D4BDE"/></svg>
      <div class="sb-logo-txt"><h1>PSC Cobrança</h1><p>Planejamento Semanal · Praso</p></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Semanas<button class="btn-nova" onclick="openModal()">+ Nova</button></div>
      <div id="sb-weeks"></div>
    </div>
    <div class="sb-visao">

// chave primária: "Beatriz|2026-07|13/07 a 17/07"

async function sbGet(){
  try{
    const {data,error}=await _sb.from('psc_data').select('mk,value');
    if(error)throw error;
    return data||[];
  }catch(e){console.warn('sbGet:',e.message);return[];}
}

async function sbSave(cobrador, mk, wk, value){
  const key=dbKey(cobrador,mk,wk);
  try{
    const {data,error}=await _sb.from('psc_data').upsert(
      {mk:key, value:value, updated_at:new Date().toISOString()},
      {onConflict:'mk'}
    ).select();
    if(error){console.error('sbSave erro:',error.message,error.details);return false;}
    console.log('Salvo:',key);
    return true;
  }catch(e){console.error('sbSave exception:',e.message);return false;}
}

async function sbDelSemana(mk,wk){
  // Deletar todas as linhas de todos os cobradores para essa semana
  try{
    for(const c of COBRADORES){
      await _sb.from('psc_data').delete().eq('mk',dbKey(c,mk,wk));
    }
  }catch(e){console.warn('sbDel:',e.message);}
}

  try{localStorage.setItem('psc_cache',JSON.stringify({DB,SEMANAS}));}catch(_){}

async function loadAll(){
  const rows=await sbGet();

  rows.forEach(row=>{
    const k=row.mk;
    const parts=k.split('|');
    // Formato correto: "Cobrador|2026-07|wk" (3 partes)
    if(parts.length===3){
      const [cobrador,mk,wk]=parts;
      if(COBRADORES.includes(cobrador)){
        if(!DB[cobrador])DB[cobrador]={};
        DB[cobrador][semKey(mk,wk)]=row.value||defPessoa();
        if(!SEMANAS[mk])SEMANAS[mk]={};
        SEMANAS[mk][wk]=true;
        return;
      }
    }
    // Ignorar formatos antigos silenciosamente
  });
  cacheSave();
  // Apagar chaves antigas do banco automaticamente
  await limparAntigas(rows);
}

async function limparAntigas(rows){
  for(const row of rows){
    const parts=row.mk.split('|');
    // Se não tem 3 partes OU cobrador não reconhecido → apagar
    if(parts.length!==3||!COBRADORES.includes(parts[0])){

function scheduleSave(){

// ══════════════════════════════════════════════════════════════
// SEMANAS ÚTEIS
// ══════════════════════════════════════════════════════════════
function weeksOfMonth(m,y){
  const weeks=[];const d=new Date(y,m,1);
  while(d.getDay()!==1)d.setDate(d.getDate()+1);
  while(d.getMonth()===m){
    const s=new Date(d),e=new Date(d);e.setDate(e.getDate()+4);
    const f=dt=>`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
    weeks.push(`${f(s)} a ${f(e)}`);d.setDate(d.getDate()+7);
  }
  return weeks;
}
function curWeekStr(){
  const h=new Date(),day=h.getDay(),diff=h.getDate()-(day===0?6:day-1);
  const s=new Date(h);s.setDate(diff);const e=new Date(s);e.setDate(s.getDate()+4);
  const f=dt=>`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
  return`${f(s)} a ${f(e)}`;
}

async function delSem(mk,wk){

function sortArr(arr,sk,sd){
  return[...arr].sort((a,b)=>{let va=a[sk]??'',vb=b[sk]??'';if(sk==='val'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}if(va<vb)return sd==='asc'?-1:1;if(va>vb)return sd==='asc'?1:-1;return 0;});
}
function toggleSort(sk,key){const cur=_sortKey[key];if(cur===sk)_sortDir[key]=_sortDir[key]==='asc'?'desc':'asc';else{_sortKey[key]=sk;_sortDir[key]=sk==='val'?'desc':'asc';}renderTbl(key);}

function showPicker(key,i,btnEl,ev){
  ev.stopPropagation();
  document.querySelectorAll('.st-picker').forEach(p=>p.remove());
  const pd=getCurData();if(!pd)return;
  normSt(pd[key][i]);
  const tags=pd[key][i].tags||[];
  const picker=document.createElement('div');picker.className='st-picker';
  picker.innerHTML=ST.map(o=>{const sel=tags.includes(o.v);return`<span class="st-picker-opt pill ${o.c}" style="opacity:${sel?.45:1};border:1.5px solid ${sel?'currentColor':'transparent'}" onclick="toggleTag('${key}',${i},'${o.v}');this.closest('.st-picker').remove()">${o.l}</span>`;}).join('');
  btnEl.parentNode.style.position='relative';btnEl.parentNode.appendChild(picker);
  setTimeout(()=>document.addEventListener('click',function h(e){if(!picker.contains(e.target)){picker.remove();document.removeEventListener('click',h);}},true),10);
}
function toggleTag(key,i,v){patch(d=>{normSt(d[key][i]);const tags=d[key][i].tags;const idx=tags.indexOf(v);if(idx>=0)tags.splice(idx,1);else tags.push(v);});renderTbl(key);}

function renderTbl(key){
  const pd=getCurData();

    if(editing){return`<tr class="row-editing">

      <td><div class="cw"><input type="text" value="${esc(c.vend)}" placeholder="${isNKA?'Responsável':'Vendedor'}" onchange="patch(d=>{d['${key}'][${i}].vend=this.value})"></div></td>
      <td><div class="cw" style="text-align:right"><input type="text" value="${fmtVal(c.val)}" style="text-align:right" onblur="const v=parseVal(this.value);patch(d=>{d['${key}'][${i}].val=v});this.value=fmtVal(v);updStats()"></div></td>
      <td><div class="cw" style="position:relative">
        <div class="multi-st">${stTags(c.tags)}</div>
        <button class="st-add-btn" onclick="showPicker('${key}',${i},this,event)">+ situação</button>
      </div></td>
      <td><div class="cw">
        <label class="toggle-limite">
          <input type="checkbox" ${c.limite?'checked':''} onchange="patch(d=>{d['${key}'][${i}].limite=this.checked});this.closest('td').querySelector('.sol-wrap').style.display=this.checked?'block':'none'">
          <span class="toggle-track"></span>

        </label>
        <div class="sol-wrap" style="margin-top:5px;display:${c.limite?'block':'none'}">
          <input type="text" class="solicitante-field" placeholder="Solicitante..." value="${esc(c.solicitante||'')}"
            onchange="patch(d=>{d['${key}'][${i}].solicitante=this.value})">
        </div>
      </div></td>
      <td><div class="cw"><textarea rows="2" onchange="patch(d=>{d['${key}'][${i}].obs=this.value})">${esc(c.obs||'')}</textarea></div></td>
      <td><div class="cw" style="display:flex;flex-direction:column;gap:4px">
        <button class="btn sm primary" onclick="_editRow=null;renderTbl('${key}')">✓</button>
        <button class="btn-del" onclick="patch(d=>{d['${key}'].splice(${i},1)});_editRow=null;renderTbl('${key}');updStats()">✕</button>
      </div></td>
    </tr>`;}
    return`<tr class="row-view" onclick="if(event.target.closest('button'))return;_editRow='${key}-${i}';renderTbl('${key}')">
      <td><div class="cw"><span class="cli-nome">${esc(c.n)||'<em style="color:var(--text3)">sem nome</em>'}</span></div></td>
      <td><div class="cw" style="font-size:12px;color:var(--text2)">${esc(c.uf)||'—'}</div></td>
      <td><div class="cw"><span class="vbadge" style="background:${vc}22;color:${vc};border:1.5px solid ${vc}44">${esc(c.vend)||'—'}</span></div></td>
      <td><div class="cw" style="text-align:right;font-size:13px;font-weight:700">${fmtVal(c.val)}</div></td>
      <td><div class="cw" style="position:relative"><div class="multi-st">${stTags(c.tags)||'<span style="font-size:11px;color:var(--text3)">—</span>'}</div></div></td>
      <td><div class="cw">
        ${c.limite
          ?`<div class="limite-wrap"><span class="limite-badge">✓ Limite</span><span style="font-size:10px;color:var(--green-txt);font-weight:500">${esc(c.solicitante||'')}</span></div>`
          :`<span class="limite-nao">—</span>`}
      </div></td>
      <td><div class="cw" style="font-size:12px;color:var(--text2);white-space:pre-wrap">${esc(c.obs||'')||'<span style="color:var(--text3)">—</span>'}</div></td>

    </tr>`;
  }).join('');
  const tot=(pd[key]||[]).reduce((s,c)=>s+(parseFloat(c.val)||0),0);

function copiar(){
  const pd=getCurData();if(!pd)return;
  const parts=curSemKey.split('|');const mk=parts[0],wk=parts[1];const[y,m]=mk.split('-');
  let t=`PSC — PLANEJAMENTO SEMANAL · PRASO\n${MESES[parseInt(m)-1]} ${y} | ${wk} | ${curCobrador}\n`;
  if(pd.foco)t+=`Foco: ${pd.foco}\n`;
  const sec=(tit,arr)=>{const it=(arr||[]).filter(c=>c.n);if(!it.length)return;t+=`\n━━ ${tit} ━━\n`;it.forEach(c=>{const tags=c.tags||(c.st?[c.st]:[]);const stls=tags.map(v=>(ST.find(x=>x.v===v)||ST[ST.length-1]).l).join(', ');t+=`• ${c.n}${c.uf?' ('+c.uf+')':''} — ${c.vend||'—'} — ${fmtVal(c.val)} — ${stls||'—'}${c.obs?'\n  '+c.obs:''}\n`;});};
  sec('M0 KEY ACCOUNT',pd.m0ka);sec('M0 NÃO KEY ACCOUNT',pd.m0nka);sec('M1/M2 KEY ACCOUNT',pd.m1ka);sec('M1/M2 NÃO KEY ACCOUNT',pd.m1nka);
  if((pd.kaD||[]).filter(a=>a.n).length){t+=`\n━━ KA COM DIFICULDADE ━━\n`;pd.kaD.filter(a=>a.n).forEach(a=>{const s=ST.find(x=>x.v===a.st)||ST[0];t+=`• ${a.n} — ${s.l}${a.obs?'\n  '+a.obs:''}\n`;});}
  if((pd.acordos||[]).filter(a=>a.n).length){t+=`\n━━ ACORDOS ATIVOS ━━\n`;pd.acordos.filter(a=>a.n).forEach(a=>{const s=SA.find(x=>x.v===a.st)||SA[0];t+=`• ${a.n} — ${s.l}${a.obs?' ('+a.obs+')':''}\n`;});}
  if(pd.m3)t+=`\n━━ BASE M3 ━━\n${pd.m3}\n`;if(pd.obs)t+=`\n━━ OBSERVAÇÕES ━━\n${pd.obs}\n`;
  navigator.clipboard.writeText(t).then(()=>showToast('Copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copiado!');});
}

function showVisao(){_mode='visao';_editRow=null;_editDif=null;_editAcordo=null;renderVisao();}

function renderVisao(){
  const mc=document.getElementById('main');
  // Semanas disponíveis
  const semanas=[];
  Object.keys(SEMANAS).sort().forEach(mk=>{
    Object.keys(SEMANAS[mk]).sort((a,b)=>{const da=a.match(/\d+/),db=b.match(/\d+/);return da&&db?parseInt(da[0])-parseInt(db[0]):0;}).forEach(wk=>{
      semanas.push({mk,wk,key:semKey(mk,wk)});
    });
  });

  const semsFiltradas=_vSemana==='todas'?semanas:semanas.filter(s=>s.key===_vSemana);

  function getClientes(secKey){
    const lista=[];
    semsFiltradas.forEach(({mk,wk,key})=>{
      COBRADORES.forEach(cob=>{
        if(_vFiltro!=='Todos'&&_vFiltro!==cob)return;
        const d=DB[cob]&&DB[cob][key];if(!d)return;
        (d[secKey]||[]).filter(c=>c.n).forEach(c=>{lista.push({...normSt(c),cob,wk});});
      });
    });
    return lista.sort((a,b)=>(parseFloat(b.val)||0)-(parseFloat(a.val)||0));
  }
  function getKAD(){const l=[];semsFiltradas.forEach(({mk,wk,key})=>{COBRADORES.forEach(cob=>{if(_vFiltro!=='Todos'&&_vFiltro!==cob)return;const d=DB[cob]&&DB[cob][key];if(!d)return;(d.kaD||[]).filter(a=>a.n).forEach(a=>{l.push({...a,cob,wk});});});});return l;}
  function getAcordos(){const l=[];semsFiltradas.forEach(({mk,wk,key})=>{COBRADORES.forEach(cob=>{if(_vFiltro!=='Todos'&&_vFiltro!==cob)return;const d=DB[cob]&&DB[cob][key];if(!d)return;(d.acordos||[]).filter(a=>a.n).forEach(a=>{l.push({...a,cob,wk});});});});return l;}

  function fmtTbl(arr){
    if(!arr.length)return`<div class="empty-v">Nenhum cliente registrado</div>`;
    const total=arr.reduce((s,c)=>s+(parseFloat(c.val)||0),0);
    return`<div style="overflow-x:auto"><table class="vtable">
      <thead><tr><th style="width:18%">Cliente</th><th style="width:5%">UF</th><th style="width:11%">Vendedor</th><th style="width:9%;text-align:right">Valor</th><th style="width:12%">Situação</th><th style="width:10%">Limite</th><th style="width:9%">Cobrador</th><th style="width:9%">Semana</th><th style="width:17%">Observação</th></tr></thead>
      <tbody>${arr.map(c=>{
        const vc=vcor(c.vend);const cc=COR[c.cob]||'#9B9DA8';
        const tags=c.tags||(c.st?[c.st]:[]);
        const stH=tags.map(v=>{const o=ST.find(x=>x.v===v)||ST[ST.length-1];return`<span class="pill ${o.c}">${o.l}</span>`;}).join(' ');
        return`<tr><td><strong style="font-size:13px">${esc(c.n)}</strong></td><td>${esc(c.uf)||'—'}</td><td><span class="vbadge" style="background:${vc}22;color:${vc};border:1.5px solid ${vc}44">${esc(c.vend)||'—'}</span></td><td style="text-align:right;font-weight:700">${fmtVal(c.val)}</td><td>${stH||'—'}</td><td>${c.limite?`<span class="limite-badge">✓ Limite<br><span style="font-size:9px;font-weight:400">${esc(c.solicitante||'')}</span></span>`:'<span style="font-size:10px;color:var(--text3)">—</span>'}</td><td><span class="cbadge" style="background:${cc}22;color:${cc};border:1px solid ${cc}44">${esc(c.cob)}</span></td><td style="font-size:11px;color:var(--text3)">${esc(c.wk)}</td><td style="font-size:11px;color:var(--text2)">${esc(c.obs||'')}</td></tr>`;
      }).join('')}</tbody></table>
      <div style="padding:8px 10px;border-top:1px solid var(--brd);text-align:right;font-size:13px;font-weight:700;background:var(--bg2)">Total: ${fmtVal(total)} · ${arr.length} clientes</div></div>`;
  }

  const m0ka=getClientes('m0ka'),m0nka=getClientes('m0nka'),m1ka=getClientes('m1ka'),m1nka=getClientes('m1nka');
  const kaD=getKAD(),acordos=getAcordos();
  const totalG=[...m0ka,...m0nka,...m1ka,...m1nka].reduce((s,c)=>s+(parseFloat(c.val)||0),0);

  mc.innerHTML=`
    <div class="topbar">
      <div class="topbar-left"><h2>📊 Visão Consolidada</h2><p>Total: ${fmtVal(totalG)} · ${m0ka.length+m0nka.length+m1ka.length+m1nka.length} clientes</p></div>
      <button class="btn" onclick="_mode='week';renderMain()">← Voltar</button>
    </div>
    <div class="filter-bar"><label>Cobrador:</label>
      ${['Todos',...COBRADORES].map(p=>{const cor=COR[p];const a=_vFiltro===p;return`<button class="fchip${a?' active':''}" style="${a&&cor?`background:${cor};border-color:${cor}`:''}" onclick="_vFiltro='${p}';renderVisao()">${p}</button>`;}).join('')}
    </div>
    <div class="filter-bar"><label>Semana:</label>
      <button class="fchip${_vSemana==='todas'?' active':''}" onclick="_vSemana='todas';renderVisao()">Todas</button>
      ${semanas.map(s=>`<button class="fchip${_vSemana===s.key?' active':''}" onclick="_vSemana='${s.key}';renderVisao()">${s.wk}</button>`).join('')}
    </div>
    <div class="grp-hdr"><div class="grp-pill m0">M0 · Maiores Clientes</div><div class="grp-line"></div></div>
    <div class="vsec"><div class="vsec-hdr m0"><div class="vttl">Key Account <span class="badge badge-ka">KA</span></div><strong>${fmtVal(m0ka.reduce((s,c)=>s+(parseFloat(c.val)||0),0))}</strong></div>${fmtTbl(m0ka)}</div>
    <div class="vsec"><div class="vsec-hdr m0"><div class="vttl">Não Key Account <span class="badge badge-nka">Não KA</span></div><strong>${fmtVal(m0nka.reduce((s,c)=>s+(parseFloat(c.val)||0),0))}</strong></div>${fmtTbl(m0nka)}</div>
    <div class="grp-hdr"><div class="grp-pill m1">M1/M2 · Maiores Clientes</div><div class="grp-line"></div></div>
    <div class="vsec"><div class="vsec-hdr m1"><div class="vttl">Key Account <span class="badge badge-m1">KA</span></div><strong>${fmtVal(m1ka.reduce((s,c)=>s+(parseFloat(c.val)||0),0))}</strong></div>${fmtTbl(m1ka)}</div>
    <div class="vsec"><div class="vsec-hdr m1"><div class="vttl">Não Key Account <span class="badge badge-nka">Não KA</span></div><strong>${fmtVal(m1nka.reduce((s,c)=>s+(parseFloat(c.val)||0),0))}</strong></div>${fmtTbl(m1nka)}</div>
    ${kaD.length?`<div class="grp-hdr"><div class="grp-pill crit">⚠ KA com Dificuldade</div><div class="grp-line"></div></div>
    <div class="vsec"><div class="vsec-hdr crit"><div class="vttl">Situações críticas <span class="badge badge-dif">Atenção</span></div></div>
    <div style="overflow-x:auto"><table class="vtable"><thead><tr><th>Cliente</th><th>Situação</th><th>Cobrador</th><th>Semana</th><th>Observação</th></tr></thead>
    <tbody>${kaD.map(a=>{const cc=COR[a.cob]||'#9B9DA8';const s=ST.find(x=>x.v===a.st)||ST[0];return`<tr><td><strong>${esc(a.n)}</strong></td><td><span class="pill ${s.c}">${s.l}</span></td><td><span class="cbadge" style="background:${cc}22;color:${cc};border:1px solid ${cc}44">${esc(a.cob)}</span></td><td style="font-size:11px;color:var(--text3)">${esc(a.wk)}</td><td style="font-size:11px;color:var(--text2)">${esc(a.obs||'')}</td></tr>`;}).join('')}</tbody></table></div></div>`:''}
    ${acordos.length?`<div class="grp-hdr"><div class="grp-pill info">Acordos Ativos</div><div class="grp-line"></div></div>
    <div class="vsec"><div class="vsec-hdr acord"><div class="vttl">Acordos <span class="badge badge-ac">${acordos.length}</span></div></div>
    <div style="overflow-x:auto"><table class="vtable"><thead><tr><th>Cliente</th><th>Status</th><th>Cobrador</th><th>Semana</th><th>Observação</th></tr></thead>
    <tbody>${acordos.map(a=>{const cc=COR[a.cob]||'#9B9DA8';const s=SA.find(x=>x.v===a.st)||SA[0];return`<tr><td><strong>${esc(a.n)}</strong></td><td><span class="pill ${s.c}">${s.l}</span></td><td><span class="cbadge" style="background:${cc}22;color:${cc};border:1px solid ${cc}44">${esc(a.cob)}</span></td><td style="font-size:11px;color:var(--text3)">${esc(a.wk)}</td><td style="font-size:11px;color:var(--text2)">${esc(a.obs||'')}</td></tr>`;}).join('')}</tbody></table></div></div>`:''}
  `;
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init(){
  setSync('saving','Conectando...');
  document.getElementById('main').innerHTML=`<div class="empty"><span class="ico" style="font-size:28px;opacity:.25">⏳</span><p style="margin-bottom:0;font-size:13px">Carregando dados...</p></div>`;

  await loadAll();

  // Restaurar última posição
  const lastSem=localStorage.getItem('psc_lastSem');
  const lastCob=localStorage.getItem('psc_lastCob');
  if(lastCob&&COBRADORES.includes(lastCob))curCobrador=lastCob;

  const mks=Object.keys(SEMANAS).sort();
  if(lastSem){
    const parts=lastSem.split('|');
    if(parts.length===2&&SEMANAS[parts[0]]&&SEMANAS[parts[0]][parts[1]])curSemKey=lastSem;
  }
  if(!curSemKey&&mks.length){
    const lastMk=mks[mks.length-1];const wks=Object.keys(SEMANAS[lastMk]).sort();
    if(wks.length)curSemKey=semKey(lastMk,wks[wks.length-1]);
  }

  document.getElementById('inp-mes').value=new Date().getMonth();
  document.getElementById('inp-ano').value=new Date().getFullYear();
  setSync('ok','Conectado · dados compartilhados ✓');
  renderSB();renderMain();
}
init();
</script>
