<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC — Planejamento Semanal · Praso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --praso:#2D4BDE;--praso-dark:#1e35b0;--praso-light:#EEF1FD;--praso-mid:#C5CEFA;
  --m0:#2D4BDE;--m0-bg:#EEF1FD;--m0-brd:#C5CEFA;
  --m1:#0ea5a0;--m1-bg:#E6F6F5;--m1-brd:#99D9D7;--m1-txt:#0a6e6b;
  --bg:#fff;--bg2:#F6F7F9;--bg3:#EDEEF2;
  --text:#16171A;--text2:#5A5C66;--text3:#9B9DA8;
  --brd:rgba(0,0,0,0.09);--brd2:rgba(0,0,0,0.16);
  --r:8px;--rl:12px;
  --green-bg:#EAFAF2;--green-txt:#1a6640;
  --red-bg:#FDEEEE;--red-txt:#8b1a1a;
  --amber-bg:#FEF5E7;--amber-txt:#7a4a00;
  --purple-bg:#F2EFFE;--purple-txt:#4a2ea0;
  --gray-bg:#F2F3F5;--gray-txt:#44464f;
  --teal-bg:#E6F6F5;--teal-txt:#0a6e6b;
  --coral-bg:#FEF0EC;--coral-txt:#8f3010;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%}
body{font-family:var(--font);font-size:14px;background:var(--bg2);color:var(--text);line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;background:var(--bg2)}
.main-inner{max-width:980px;margin:0 auto;padding:1.75rem 2rem 5rem}

/* SIDEBAR */
.sb-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.sb-logo-txt h1{font-size:13px;font-weight:700;color:var(--text)}
.sb-logo-txt p{font-size:10px;color:var(--text3);margin-top:1px}
.sb-sec{padding:.875rem 1rem .25rem}
.sb-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.btn-nova-sb{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--praso);background:none;color:var(--praso);cursor:pointer;font-family:var(--font);font-weight:600}
.btn-nova-sb:hover{background:var(--praso-light)}
.sb-month{margin-bottom:10px}
.sb-month-name{font-size:12px;font-weight:600;color:var(--text2);padding:4px 2px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sb-month-name:hover{color:var(--text)}
.sb-month-name .arr{font-size:10px;color:var(--text3);transition:transform .18s}
.sb-month-name.open .arr{transform:rotate(90deg)}
.sb-weeks{padding-left:6px;margin-top:2px}
.wk-item{font-size:12px;color:var(--text2);padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;transition:background .12s;gap:4px}
.wk-item:hover{background:var(--bg2);color:var(--text)}
.wk-item.active{background:var(--praso-light);color:var(--praso);font-weight:600}
.wk-item-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wk-actions{display:none;gap:2px;flex-shrink:0}
.wk-item:hover .wk-actions{display:flex}
.wk-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:3px;font-size:11px;color:var(--text3);line-height:1}
.wk-btn:hover{background:var(--bg3);color:var(--text)}
.wk-btn.del:hover{color:#ef4444;background:var(--red-bg)}
.btn-new-wk-sm{font-size:11px;padding:4px 8px;border-radius:6px;border:1px dashed var(--brd2);background:none;color:var(--text3);cursor:pointer;width:100%;text-align:left;margin-top:3px;font-family:var(--font)}
.btn-new-wk-sm:hover{color:var(--text);background:var(--bg2)}
.sb-footer{margin-top:auto;padding:.75rem 1rem;border-top:1px solid var(--brd);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.dot.saving{background:#f59e0b}.dot.err{background:#ef4444}

/* TOPBAR */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.topbar-left h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.025em}
.topbar-left p{font-size:13px;color:var(--text2);margin-top:3px}
.topbar-acts{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* BUTTONS */
.btn{font-size:12px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-weight:500;transition:background .12s}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--praso);color:#fff;border-color:var(--praso)}
.btn.primary:hover{background:var(--praso-dark)}
.btn.sm{font-size:11px;padding:4px 10px}
.btn.danger{color:#ef4444;border-color:#ef4444}
.btn.danger:hover{background:var(--red-bg)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.5rem}
.stat{background:var(--bg);border-radius:var(--r);border:1px solid var(--brd);padding:.75rem 1rem}
.stat .lbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.stat .val{font-size:15px;font-weight:700;color:var(--text)}
.stat.am0{border-left:3px solid var(--m0)}
.stat.am1{border-left:3px solid var(--m1)}

/* FOCUS */
.focus-box{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rl);padding:.875rem 1.125rem;margin-bottom:1.5rem}
.focus-box label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:5px}
.focus-box textarea{width:100%;font-size:15px;font-weight:600;background:none;border:none;border-bottom:2px solid var(--brd2);color:var(--text);padding:4px 0;font-family:var(--font);resize:none;min-height:36px;line-height:1.5;overflow:hidden}
.focus-box textarea:focus{outline:none;border-color:var(--praso)}

/* GROUP HEADER */
.grp-hdr{display:flex;align-items:center;margin:2rem 0 1rem;gap:0}
.grp-pill{display:flex;align-items:center;gap:8px;padding:.5rem 1.125rem;font-size:13px;font-weight:700;white-space:nowrap;border-radius:var(--rl);flex-shrink:0}
.grp-pill.m0{background:var(--m0);color:#fff}
.grp-pill.m1{background:var(--m1);color:#fff}
.grp-pill.crit{background:#ef4444;color:#fff}
.grp-pill.info{background:var(--bg3);color:var(--text2);font-size:12px}
.grp-line{flex:1;height:1px;background:var(--brd);margin-left:12px}

/* SECTION CARD */
.sec-card{background:var(--bg);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:12px;overflow:hidden}
.sec-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.125rem;border-bottom:1px solid var(--brd)}
.sec-card-hdr.m0{border-left:4px solid var(--m0);background:var(--m0-bg)}
.sec-card-hdr.m1{border-left:4px solid var(--m1);background:var(--m1-bg)}
.sec-card-hdr.ka-dif{border-left:4px solid #ef4444;background:#FEF2F2}
.sec-card-hdr.neu{border-left:4px solid var(--bg3);background:var(--bg2)}
.sec-card-title{display:flex;align-items:center;gap:8px}
.sec-card-title .ttl{font-size:13px;font-weight:700;color:var(--text)}
.sec-card-title .sub{font-size:11px;color:var(--text2);margin-left:2px}
.sec-card-hdr-right{display:flex;align-items:center;gap:6px}
.sec-card-body{padding:.75rem 1.125rem 1rem}

/* BADGE */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.badge-ka{background:var(--praso-light);color:var(--praso);border:1px solid var(--praso-mid)}
.badge-nka{background:var(--amber-bg);color:var(--amber-txt)}
.badge-ac{background:var(--green-bg);color:var(--green-txt)}
.badge-dif{background:#FEF2F2;color:#b91c1c;border:1px solid #fca5a5}
.badge-m3{background:var(--purple-bg);color:var(--purple-txt)}
.badge-m1{background:var(--m1-bg);color:var(--m1-txt);border:1px solid var(--m1-brd)}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:6px;padding:6px 0 8px;flex-wrap:wrap}
.sort-bar label{font-size:11px;color:var(--text3);font-weight:500}
.sort-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}
.sort-btn:hover{background:var(--bg3);color:var(--text)}
.sort-btn.active{background:var(--praso-light);color:var(--praso);border-color:var(--praso-mid);font-weight:600}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table.ct{width:100%;border-collapse:collapse;min-width:580px}
table.ct th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--brd)}
table.ct td{padding:0;border-bottom:1px solid var(--brd);vertical-align:middle}
table.ct tr:last-child td{border-bottom:none}
.cw{padding:6px 8px}
.row-view{cursor:pointer;transition:background .1s}
.row-view:hover td{background:var(--praso-light)!important}
.row-editing td{background:var(--bg2)!important}
table.ct input,table.ct select,table.ct textarea{font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;font-family:var(--font)}
table.ct input:focus,table.ct select:focus,table.ct textarea:focus{outline:none;border-color:var(--praso)}
table.ct textarea{resize:vertical;min-height:38px;line-height:1.5}
.cli-nome-c{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.vbadge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.btn-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:3px 5px;border-radius:4px}
.btn-del:hover{color:#ef4444;background:var(--red-bg)}

/* PILLS */
.pill{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;font-weight:600;margin-top:2px}
.p-base{background:var(--praso-light);color:var(--praso)}
.p-promessa{background:var(--green-bg);color:var(--green-txt)}
.p-boleto{background:var(--purple-bg);color:var(--purple-txt)}
.p-sem-retorno{background:var(--amber-bg);color:var(--amber-txt)}
.p-serasa{background:var(--red-bg);color:var(--red-txt)}
.p-negociacao{background:var(--teal-bg);color:var(--teal-txt)}
.p-sem-exp{background:var(--gray-bg);color:var(--gray-txt)}
.p-outros{background:var(--gray-bg);color:var(--gray-txt)}
.p-pagando{background:var(--green-bg);color:var(--green-txt)}
.p-atrasado{background:var(--coral-bg);color:var(--coral-txt)}
.p-encerrado{background:var(--gray-bg);color:var(--gray-txt)}
.multi-st{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.st-add-btn{font-size:10px;padding:2px 8px;border-radius:20px;border:1px dashed var(--brd2);background:none;color:var(--text3);cursor:pointer;font-family:var(--font);margin-top:3px}
.st-add-btn:hover{background:var(--bg2);color:var(--text)}
.st-picker{position:absolute;z-index:100;background:var(--bg);border:1px solid var(--brd2);border-radius:var(--r);padding:8px;display:flex;flex-wrap:wrap;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:260px}
.st-picker-opt{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;cursor:pointer;border:1.5px solid transparent}
.st-picker-opt:hover{filter:brightness(.9)}

/* TOTAL SEÇÃO */
.sec-total{display:flex;align-items:center;justify-content:flex-end;padding:8px 14px;border-top:1px solid var(--brd);background:var(--bg2)}
.sec-total .lbl{font-size:11px;color:var(--text3);margin-right:8px;font-weight:500}
.sec-total .val{font-size:14px;font-weight:700;color:var(--text)}

/* DIF CARDS */
.dif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.dif-card{background:var(--bg);border:1px solid #fca5a5;border-left:4px solid #ef4444;border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:background .12s;position:relative}
.dif-card:hover{background:#FEF2F2}
.dif-card-editing{border-color:var(--praso)!important;border-left-color:var(--praso)!important;background:var(--bg2)!important;cursor:default!important}
.dif-card input,.dif-card textarea,.dif-card select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;margin-bottom:6px;font-family:var(--font)}
.dif-card textarea{resize:vertical;min-height:60px;line-height:1.5}
.dif-card input:focus,.dif-card textarea:focus,.dif-card select:focus{outline:none;border-color:var(--praso)}

/* ACORDOS */
.acord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ac-card{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:background .12s;position:relative}
.ac-card:hover{background:var(--praso-light)}
.ac-card-editing{border-color:var(--praso)!important;background:var(--bg2)!important;cursor:default!important}
.ac-card input,.ac-card select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--text);width:100%;margin-bottom:6px;font-family:var(--font)}
.ac-card input:focus,.ac-card select:focus{outline:none;border-color:var(--praso)}

/* TEXTAREA BOXES */
.ta-box label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:7px}
.ta-box textarea{width:100%;font-size:13px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--text);resize:vertical;min-height:90px;font-family:var(--font);line-height:1.6}
.ta-box textarea:focus{outline:none;border-color:var(--praso);background:var(--bg)}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;width:380px;max-width:95vw;border:1px solid var(--brd2);box-shadow:0 12px 40px rgba(0,0,0,.13)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--text)}
.modal label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.modal input,.modal select{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg2);color:var(--text);font-family:var(--font);margin-bottom:1rem}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--praso);background:var(--bg)}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.week-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.week-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.week-chip:hover,.week-chip.selected{background:var(--praso);color:#fff;border-color:var(--praso)}

/* EMPTY */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty .ico{font-size:44px;margin-bottom:1rem;opacity:.3;display:block}
.empty p{font-size:14px;margin-bottom:1.25rem}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#16171A;color:#fff;font-size:12px;font-weight:500;padding:9px 20px;border-radius:20px;opacity:0;transition:opacity .22s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1}

@media(max-width:680px){.sidebar{display:none}.main-inner{padding:1rem 1rem 4rem}}
@media print{.sidebar,.topbar-acts,.btn,.btn-del,.btn-new-wk-sm,.wk-btn,.sort-bar,.st-add-btn{display:none!important}.shell{display:block}.main{overflow:visible;background:#fff}.main-inner{max-width:100%;padding:1rem}.sec-card{break-inside:avoid}}

/* ── VISÃO CONSOLIDADA ── */
.visao-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.visao-header h2{font-size:22px;font-weight:700;color:var(--text)}
.visao-header p{font-size:13px;color:var(--text2);margin-top:3px}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text2)}
.filter-chip{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s}
.filter-chip:hover{background:var(--bg3)}
.filter-chip.active{background:var(--praso);color:#fff;border-color:var(--praso);font-weight:600}
.visao-sec{background:var(--bg);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:16px;overflow:hidden}
.visao-sec-hdr{padding:.75rem 1.125rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.visao-sec-hdr.m0{border-left:4px solid var(--m0);background:var(--m0-bg)}
.visao-sec-hdr.m1{border-left:4px solid var(--m1);background:var(--m1-bg)}
.visao-sec-hdr.crit{border-left:4px solid #ef4444;background:#FEF2F2}
.visao-sec-hdr.acord{border-left:4px solid #22c55e;background:var(--green-bg)}
.visao-ttl{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.visao-total{font-size:13px;font-weight:700;color:var(--text)}
.visao-table{width:100%;border-collapse:collapse;min-width:600px}
.visao-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--brd)}
.visao-table td{padding:8px 10px;border-bottom:1px solid var(--brd);font-size:12px;vertical-align:middle}
.visao-table tr:last-child td{border-bottom:none}
.visao-table tr:hover td{background:var(--bg2)}
.pessoa-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.semana-tag{font-size:10px;color:var(--text3);display:block;margin-top:2px}
.empty-visao{text-align:center;padding:2rem;color:var(--text3);font-size:13px}

</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect x="0" y="0" width="16" height="16" rx="2" fill="#2D4BDE"/><rect x="20" y="0" width="16" height="16" rx="2" fill="#2D4BDE" opacity=".35"/><rect x="0" y="20" width="16" height="16" rx="2" fill="#2D4BDE" opacity=".35"/><rect x="20" y="20" width="16" height="16" rx="2" fill="#2D4BDE"/></svg>
      <div class="sb-logo-txt"><h1>PSC Cobrança</h1><p>Planejamento Semanal · Praso</p></div>
    </div>
    <div class="sb-sec">
      <div class="sb-sec-lbl">Semanas<button class="btn-nova-sb" onclick="openModal()">+ Nova</button></div>
      <div id="sb-weeks"></div>
    </div>
    <div class="sb-visao" style="padding:.75rem 1rem;border-top:1px solid var(--brd)">
      <button onclick="showVisao()" id="btn-visao" style="width:100%;font-size:12px;padding:7px 10px;border-radius:var(--r);border:1px solid var(--praso);background:var(--praso-light);color:var(--praso);cursor:pointer;font-family:var(--font);font-weight:600;text-align:left">
        📊 Visão Consolidada
      </button>
    </div>
    <div class="sb-footer"><span class="dot" id="dot"></span><span id="sync-txt">Carregando...</span></div>
  </aside>
  <main class="main"><div class="main-inner" id="main"></div></main>
</div>

<!-- MODAL NOVA SEMANA -->
<div class="modal-ov" id="modal-ov">
  <div class="modal">

// ── CLOUD ──────────────────────────────────────────────────────
async function cloudGet(){
  // Cache local imediato
  let cached={};
  try{const lc=localStorage.getItem('psc_v3');if(lc)cached=JSON.parse(lc);}catch(_){}

  try{
    const {data,error}=await _sb.from('psc_data').select('mk,value').order('mk');
    if(!error&&data&&data.length>0){
      // Cada linha é uma semana individual: mk = "2026-07|Beatriz 13/07 a 17/07"
      const result={};
      data.forEach(row=>{
        const parts=row.mk.split('|');
        if(parts.length===2){
          const [monthKey,weekKey]=parts;
          if(!result[monthKey])result[monthKey]={};
          result[monthKey][weekKey]=row.value;
        } else {
          // Formato antigo (por mês) — migrar
          if(typeof row.value==='object'){
            Object.keys(row.value).forEach(wk=>{
              if(!result[row.mk])result[row.mk]={};
              result[row.mk][wk]=row.value[wk];
            });
          }
        }
      });
      try{localStorage.setItem('psc_v3',JSON.stringify(result));}catch(_){}
      return result;
    }
    if(error) console.warn('supabase get error:',error.message);
  }catch(e){console.warn('supabase get:',e.message);}

  if(Object.keys(cached).length>0){setSync('err','Cache local — reconectando...');return cached;}
  return{};
}

async function cloudSet(mk,val){
  // val aqui é o objeto do MÊS inteiro — salvar cada semana individualmente
  DB[mk]=val;
  try{localStorage.setItem('psc_v3',JSON.stringify(DB));}catch(_){}
  try{
    // Salvar cada semana como uma linha separada: chave = "2026-07|nome da semana"
    const weeks=Object.keys(val);
    for(const wk of weeks){
      const rowKey=mk+'|'+wk;
      const {error}=await _sb.from('psc_data').upsert(
        {mk:rowKey, value:val[wk], updated_at:new Date().toISOString()},
        {onConflict:'mk'}
      );
      if(error){console.warn('supabase set error:',wk,error.message);return false;}
    }
    return true;
  }catch(e){console.warn('supabase set:',e.message);return false;}
}

// Salvar apenas UMA semana específica (sem sobrescrever as outras)
async function cloudSetWeek(mk,wk,weekData){
  // Atualizar cache local
  if(!DB[mk])DB[mk]={};
  DB[mk][wk]=weekData;
  try{localStorage.setItem('psc_v3',JSON.stringify(DB));}catch(_){}
  try{
    const rowKey=mk+'|'+wk;
    const {error}=await _sb.from('psc_data').upsert(
      {mk:rowKey, value:weekData, updated_at:new Date().toISOString()},
      {onConflict:'mk'}
    );
    if(error){console.warn('supabase setWeek error:',error.message);return false;}
    return true;
  }catch(e){console.warn('supabase setWeek:',e.message);return false;}
}

async function cloudDel(mk,wk){
  try{
    if(wk){
      // Deletar semana específica
      const {error}=await _sb.from('psc_data').delete().eq('mk',mk+'|'+wk);
      if(error) console.warn('supabase del error:',error.message);
    } else {
      // Deletar todas as semanas do mês
      const {error}=await _sb.from('psc_data').delete().like('mk',mk+'|%');
      if(error) console.warn('supabase del error:',error.message);
    }
  }catch(e){console.warn('supabase del:',e.message);}
}

// ── SEMANAS ÚTEIS ─────────────────────────────────────────────
function getWeeksOfMonth(month,year){
  const weeks=[];
  const d=new Date(year,month,1);
  // Avançar para segunda-feira
  while(d.getDay()!==1)d.setDate(d.getDate()+1);
  while(d.getMonth()===month){
    const start=new Date(d);
    const end=new Date(d);
    end.setDate(end.getDate()+4);
    const fmt=dt=>`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
    weeks.push(`${fmt(start)} a ${fmt(end)}`);
    d.setDate(d.getDate()+7);
  }
  return weeks;
}

function updateWeekChips(){
  const mes=parseInt(document.getElementById('inp-mes').value);
  const ano=parseInt(document.getElementById('inp-ano').value);
  const weeks=getWeeksOfMonth(mes,ano);
  const chips=document.getElementById('week-chips');
  chips.innerHTML=weeks.map(w=>`<span class="week-chip" onclick="selectChip(this,'${w}')">${w}</span>`).join('');
  // Preencher select de cópia
  const copyFrom=document.getElementById('inp-copy-from');

      const[y,m]=mk.split('-');
      copyFrom.innerHTML+=`<option value="${mk}|${wk}">${MESES[parseInt(m)-1]} ${y} · ${wk}</option>`;
    });
  });
}

        <button class="btn-new-wk-sm" onclick="openModalFor('${mk}')">+ Nova semana</button>

function toggleM(mk,el){

  const open=sub.style.display!=='none';
  sub.style.display=open?'none':'block';
  el.classList.toggle('open',!open);
}
function selWeek(mk,wk){
  localStorage.setItem('psc_lastMK',mk);
  localStorage.setItem('psc_lastWK',wk);
  curMK=mk;curWK=wk;_editRow=null;_editDif=null;_editAcordo=null;
  renderSB();renderMain();
}
async function delWeek(mk,wk){
  if(!confirm(`Excluir "${wk}"?`))return;
  await cloudDel(mk,wk);
  if(DB[mk]&&DB[mk][wk])delete DB[mk][wk];
  if(DB[mk]&&!Object.keys(DB[mk]).length){delete DB[mk];await cloudDel(mk);}
  try{localStorage.setItem('psc_v3',JSON.stringify(DB));}catch(_){}
  if(curMK===mk&&curWK===wk){const mks=Object.keys(DB);curMK=mks.length?mks[mks.length-1]:null;curWK=curMK?Object.keys(DB[curMK])[0]:null;}
  renderSB();renderMain();showToast('Semana excluída');
}

function closeRename(){document.getElementById('modal-rename').classList.remove('open');}
async function confirmarRename(){
  if(!_renameTarget)return;
  const newName=document.getElementById('inp-rename').value.trim();
  if(!newName){alert('Informe o nome.');return;}
  const{mk,wk}=_renameTarget;
  if(newName===wk){closeRename();return;}
  if(DB[mk][newName]){alert('Já existe uma semana com esse nome.');return;}
  DB[mk][newName]=DB[mk][wk];
  DB[mk][newName].label=newName;
  delete DB[mk][wk];
  await cloudSet(mk,DB[mk]);
  if(curMK===mk&&curWK===wk)curWK=newName;
  localStorage.setItem('psc_lastWK',newName);
  closeRename();renderSB();renderMain();showToast('Semana renomeada!');
}

async function criarSemana(){
  const sem=document.getElementById('inp-semana').value.trim();
  if(!sem){alert('Selecione ou digite o intervalo da semana.');return;}
  const mes=parseInt(document.getElementById('inp-mes').value);
  const ano=parseInt(document.getElementById('inp-ano').value);
  const mk=modalForMK||mesKey(mes,ano);
  const copyFrom=document.getElementById('inp-copy-from').value;
  if(!DB[mk])DB[mk]={};
  if(DB[mk][sem]){alert('Esta semana já existe.');return;}

  // Copiar ou criar em branco
  if(copyFrom){
    const[srcMK,srcWK]=copyFrom.split('|');
    if(DB[srcMK]&&DB[srcMK][srcWK]){
      DB[mk][sem]=JSON.parse(JSON.stringify(DB[srcMK][srcWK]));
      DB[mk][sem].label=sem;
      showToast('Dados copiados de '+srcWK);
    } else {
      DB[mk][sem]=defWeek(sem);
    }
  } else {
    DB[mk][sem]=defWeek(sem);
  }

  setSync('saving','Criando...');
  await cloudSet(mk,DB[mk]);
  setSync('ok','Salvo · compartilhado ✓');
  curMK=mk;curWK=sem;
  localStorage.setItem('psc_lastMK',mk);
  localStorage.setItem('psc_lastWK',sem);
  closeModal();renderSB();renderMain();showToast('Semana criada!');
}

// ── SORT ──────────────────────────────────────────────────────
function sortArr(arr,key,dir){
  return [...arr].sort((a,b)=>{
    let va=a[key]??'',vb=b[key]??'';
    if(key==='val'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    if(va<vb)return dir==='asc'?-1:1;
    if(va>vb)return dir==='asc'?1:-1;
    return 0;
  });
}
function toggleSort(key,tblKey){
  const cur=_sortKey[tblKey];
  if(cur===key)_sortDir[tblKey]=_sortDir[tblKey]==='asc'?'desc':'asc';
  else{_sortKey[tblKey]=key;_sortDir[tblKey]='desc';}
  renderTbl(tblKey);
}

// ── SITUAÇÃO MULTI-SELECT ──────────────────────────────────────
function toggleTag(key,i,v){
  patch(d=>{
    normSt(d[key][i]);
    const tags=d[key][i].tags;
    const idx=tags.indexOf(v);
    if(idx>=0)tags.splice(idx,1);
    else tags.push(v);
  });
  renderTbl(key);
}
function showPicker(key,i,btnEl,event){
  event.stopPropagation();
  document.querySelectorAll('.st-picker').forEach(p=>p.remove());
  const d=getWeek();if(!d)return;
  normSt(d[key][i]);
  const tags=d[key][i].tags||[];
  const picker=document.createElement('div');
  picker.className='st-picker';
  picker.innerHTML=ST.map(o=>{
    const sel=tags.includes(o.v);
    return`<span class="st-picker-opt pill ${o.c}" style="opacity:${sel?.45:1};border-color:${sel?'currentColor':'transparent'}"
      onclick="toggleTag('${key}',${i},'${o.v}');this.closest('.st-picker').remove()">${o.l}</span>`;
  }).join('');
  btnEl.parentNode.style.position='relative';
  btnEl.parentNode.appendChild(picker);
  setTimeout(()=>document.addEventListener('click',function h(e){if(!picker.contains(e.target)){picker.remove();document.removeEventListener('click',h);}},true),10);
}

  ['n','val','vend'].forEach(k=>{

        <td><div class="cw" style="text-align:right"><input type="text" value="${fmtVal(c.val)}" style="text-align:right" onblur="const v=parseVal(this.value);patch(d=>{d['${key}'][${i}].val=v});this.value=fmtVal(v);updStats()"></div></td>
        <td><div class="cw" style="position:relative">
          <div class="multi-st">${stTags(c.tags)}</div>

      <td><div class="cw"><span style="font-size:12px;color:var(--text2)">${esc(c.uf)||'—'}</span></div></td>
      <td><div class="cw"><span class="vbadge" style="background:${vc}22;color:${vc};border:1.5px solid ${vc}44">${esc(c.vend)||'—'}</span></div></td>
      <td><div class="cw" style="text-align:right"><span style="font-size:13px;font-weight:700">${fmtVal(c.val)}</span></div></td>

function updStats(){
  const d=getWeek();if(!d)return;
  const sum=k=>(d[k]||[]).reduce((s,c)=>s+(parseFloat(c.val)||0),0);
  const sr=[...(d.m0ka||[]),...(d.m0nka||[]),...(d.m1ka||[]),...(d.m1nka||[])].filter(c=>{
    const tags=c.tags||(c.st?[c.st]:[]);
    return tags.includes('sem-retorno')||tags.includes('sem-exp');
  }).length;
  const sb=document.getElementById('stats-box');
  if(sb)sb.innerHTML=`
    <div class="stat am0"><div class="lbl">M0 · KA</div><div class="val">${fmtVal(sum('m0ka'))}</div></div>
    <div class="stat am0"><div class="lbl">M0 · Não KA</div><div class="val">${fmtVal(sum('m0nka'))}</div></div>
    <div class="stat am1"><div class="lbl">M1/M2 · KA</div><div class="val">${fmtVal(sum('m1ka'))}</div></div>
    <div class="stat am1"><div class="lbl">M1/M2 · Não KA</div><div class="val">${fmtVal(sum('m1nka'))}</div></div>
    <div class="stat"><div class="lbl">Acordos ativos</div><div class="val">${(d.acordos||[]).length}</div></div>
    <div class="stat"><div class="lbl">Sem retorno</div><div class="val">${sr}</div></div>`;
  ['m0ka','m0nka','m1ka','m1nka'].forEach(k=>{
    const el=document.getElementById('total-'+k);
    if(el)el.querySelector('.val').textContent=fmtVal(sum(k));
  });
  const b=document.getElementById('badge-ac');if(b)b.textContent=(d.acordos||[]).length;
}

function copiar(){
  const d=getWeek();if(!d)return;
  const[y,m]=curMK.split('-');
  let t=`PSC — PLANEJAMENTO SEMANAL · PRASO\n${MESES[parseInt(m)-1]} ${y} | Semana: ${curWK}\n`;
  if(d.foco)t+=`Foco: ${d.foco}\n`;
  const sec=(tit,arr)=>{
    const it=(arr||[]).filter(c=>c.n);if(!it.length)return;
    t+=`\n━━ ${tit} ━━\n`;
    it.forEach(c=>{
      const tags=c.tags||(c.st?[c.st]:[]);
      const stls=tags.map(v=>(ST.find(x=>x.v===v)||ST[ST.length-1]).l).join(', ');
      t+=`• ${c.n}${c.uf?' ('+c.uf+')':''} — ${c.vend||'—'} — ${fmtVal(c.val)} — ${stls||'—'}${c.obs?'\n  '+c.obs:''}\n`;
    });
  };
  sec('M0 KEY ACCOUNT',d.m0ka);sec('M0 NÃO KEY ACCOUNT',d.m0nka);
  sec('M1/M2 KEY ACCOUNT',d.m1ka);sec('M1/M2 NÃO KEY ACCOUNT',d.m1nka);
  if((d.kaD||[]).filter(a=>a.n).length){
    t+=`\n━━ KA COM DIFICULDADE ━━\n`;
    d.kaD.filter(a=>a.n).forEach(a=>{const s=ST.find(x=>x.v===a.st)||ST[0];t+=`• ${a.n} — ${s.l}${a.obs?'\n  '+a.obs:''}\n`;});
  }
  if((d.acordos||[]).filter(a=>a.n).length){
    t+=`\n━━ ACORDOS ATIVOS ━━\n`;
    d.acordos.filter(a=>a.n).forEach(a=>{const s=SA.find(x=>x.v===a.st)||SA[0];t+=`• ${a.n} — ${s.l}${a.obs?' ('+a.obs+')':''}\n`;});
  }
  if(d.m3)t+=`\n━━ BASE M3 ━━\n${d.m3}\n`;
  if(d.obs)t+=`\n━━ OBSERVAÇÕES ━━\n${d.obs}\n`;
  navigator.clipboard.writeText(t).then(()=>showToast('Resumo copiado!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copiado!');
  });
}


// ── VISÃO CONSOLIDADA ──────────────────────────────────────────
let _visaoFilter = 'todos';

function showVisao(){
  _editRow=null;_editDif=null;_editAcordo=null;
  curWK=null; // modo visão
  renderVisao();
}

function renderVisao(){
  const mc=document.getElementById('main');

  // Coletar todas as semanas de todas as pessoas do mês atual
  const todasSemanas=[];
  Object.keys(DB).forEach(mk=>{
    Object.keys(DB[mk]).forEach(wk=>{
      todasSemanas.push({mk,wk,data:DB[mk][wk]});
    });
  });

  if(!todasSemanas.length){
    mc.innerHTML=`<div class="empty"><span class="ico">📊</span><p>Nenhuma semana criada ainda.</p></div>`;
    return;
  }

  // Extrair nomes únicos de pessoas (da primeira palavra do nome da semana)
  const pessoas=new Set();
  todasSemanas.forEach(({wk})=>{
    const nome=wk.split(' ')[0];
    if(nome)pessoas.add(nome);
  });

  // Consolidar clientes por seção
  function getClientes(secKey){
    const lista=[];
    todasSemanas.forEach(({wk,data})=>{
      const pessoa=wk.split(' ')[0]||wk;
      const arr=data[secKey]||[];
      arr.filter(c=>c.n).forEach(c=>{
        if(_visaoFilter==='todos'||_visaoFilter===pessoa){
          lista.push({...c,pessoa,semana:wk});
        }
      });
    });
    return lista;
  }

  function getKADif(){
    const lista=[];
    todasSemanas.forEach(({wk,data})=>{
      const pessoa=wk.split(' ')[0]||wk;
      (data.kaD||[]).filter(a=>a.n).forEach(a=>{
        if(_visaoFilter==='todos'||_visaoFilter===pessoa){
          lista.push({...a,pessoa,semana:wk});
        }
      });
    });
    return lista;
  }

  function getAcordos(){
    const lista=[];
    todasSemanas.forEach(({wk,data})=>{
      const pessoa=wk.split(' ')[0]||wk;
      (data.acordos||[]).filter(a=>a.n).forEach(a=>{
        if(_visaoFilter==='todos'||_visaoFilter===pessoa){
          lista.push({...a,pessoa,semana:wk});
        }
      });
    });
    return lista;
  }

  function fmtClientes(arr,accentCls){
    if(!arr.length)return`<div class="empty-visao">Nenhum cliente registrado</div>`;
    const total=arr.reduce((s,c)=>s+(parseFloat(c.val)||0),0);
    return`<div style="overflow-x:auto">
      <table class="visao-table">

          <th style="width:22%">Cliente</th>

          <th style="width:13%">Vendedor</th>
          <th style="width:12%;text-align:right">Valor</th>
          <th style="width:15%">Situação</th>
          <th style="width:14%">Pessoa</th>
          <th style="width:16%">Observação</th>
        </tr></thead>
        <tbody>
          ${arr.map(c=>{
            const vc=vendorColor(c.vend);
            const tags=(c.tags||(c.st?[c.st]:[]));
            const stHtml=tags.map(v=>{const o=ST.find(x=>x.v===v)||ST[ST.length-1];return`<span class="pill ${o.c}">${o.l}</span>`;}).join(' ');
            const pc=vendorColor(c.pessoa);
            return`<tr>
              <td><strong style="font-size:13px">${esc(c.n)}</strong><span class="semana-tag">${esc(c.semana)}</span></td>
              <td>${esc(c.uf)||'—'}</td>
              <td><span class="vbadge" style="background:${vc}22;color:${vc};border:1.5px solid ${vc}44">${esc(c.vend)||'—'}</span></td>
              <td style="text-align:right;font-weight:700">${fmtVal(c.val)}</td>
              <td>${stHtml||'—'}</td>
              <td><span class="pessoa-badge" style="background:${pc}22;color:${pc};border:1px solid ${pc}44">${esc(c.pessoa)}</span></td>
              <td style="color:var(--text2);font-size:11px;white-space:pre-wrap">${esc(c.obs||'')}</td>

        Total: ${fmtVal(total)}

      ${filterChips.map(f=>`<button class="filter-chip${_visaoFilter===f.v?' active':''}" onclick="_visaoFilter='${f.v}';renderVisao()">${f.l}</button>`).join('')}

        <thead><tr><th>Cliente</th><th>Situação</th><th>Pessoa</th><th>Observação</th></tr></thead>
        <tbody>${kaD.map(a=>{const pc=vendorColor(a.pessoa);const stO=ST.find(x=>x.v===a.st)||ST[0];return`<tr>
          <td><strong>${esc(a.n)}</strong><span class="semana-tag">${esc(a.semana)}</span></td>
          <td><span class="pill ${stO.c}">${stO.l}</span></td>
          <td><span class="pessoa-badge" style="background:${pc}22;color:${pc};border:1px solid ${pc}44">${esc(a.pessoa)}</span></td>
          <td style="font-size:11px;color:var(--text2)">${esc(a.obs||'')}</td>
        </tr>`;}).join('')}</tbody>
      </table></div>
    </div>`:''}

    ${acordos.length?`
    <div class="grp-hdr"><div class="grp-pill info">Acordos Ativos</div><div class="grp-line"></div></div>
    <div class="visao-sec">
      <div class="visao-sec-hdr acord"><div class="visao-ttl">Acordos <span class="badge badge-ac">${acordos.length}</span></div></div>
      <div style="overflow-x:auto"><table class="visao-table">

          <td><strong>${esc(a.n)}</strong><span class="semana-tag">${esc(a.semana)}</span></td>
          <td><span class="pill ${stO.c}">${stO.l}</span></td>
          <td><span class="pessoa-badge" style="background:${pc}22;color:${pc};border:1px solid ${pc}44">${esc(a.pessoa)}</span></td>
          <td style="font-size:11px;color:var(--text2)">${esc(a.obs||'')}</td>
        </tr>`;}).join('')}</tbody>
      </table></div>
    </div>`:''}
  `;
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  setSync('saving','Conectando...');
  document.getElementById('main').innerHTML=
    `<div class="empty"><span class="ico" style="font-size:28px;opacity:.25">⏳</span><p style="margin-bottom:0;font-size:13px">Carregando...</p></div>`;

  DB=await cloudGet();

  // Limpar chaves corrompidas (datas longas do Google Sheets)
  const bad=Object.keys(DB).filter(k=>k.includes('GMT')||k.includes('Horário')||k.length>12);
  for(const bk of bad){delete DB[bk];await cloudDel(bk);}

  // Restaurar última semana visitada
  const lastMK=localStorage.getItem('psc_lastMK');
  const lastWK=localStorage.getItem('psc_lastWK');

  if(!Object.keys(DB).length){
    const mk=mesKey(new Date().getMonth(),new Date().getFullYear());
    DB[mk]={};
    await cloudSet(mk,DB[mk]);
    curMK=mk;curWK=null;
  } else if(lastMK&&lastWK&&DB[lastMK]&&DB[lastMK][lastWK]){
    curMK=lastMK;curWK=lastWK;
  } else {
    const mks=Object.keys(DB).sort();
    curMK=mks[mks.length-1];
    curWK=null;
  }

  document.getElementById('inp-mes').value=new Date().getMonth();
  document.getElementById('inp-ano').value=new Date().getFullYear();
  setSync('ok','Conectado · dados compartilhados ✓');
  renderSB();renderMain();
}
init();
</script>
